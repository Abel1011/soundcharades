<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0E7490"/>
  
  <!-- Headphone band -->
  <path d="M8 13 C8 7, 24 7, 24 13" stroke="#1E293B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Left ear cup -->
  <rect x="5" y="11" width="4.5" height="7" rx="2" fill="#F43F5E"/>
  
  <!-- Right ear cup -->
  <rect x="22.5" y="11" width="4.5" height="7" rx="2" fill="#F43F5E"/>
  
  <!-- Face body (lighter teal area) -->
  <rect x="8.5" y="10" width="15" height="15" rx="5" fill="#0891B2"/>
  
  <!-- Left eye -->
  <circle cx="13" cy="17" r="2.2" fill="#FEF7EC"/>
  <circle cx="13.5" cy="17.2" r="1.2" fill="#1E293B"/>
  <circle cx="14" cy="16.5" r="0.4" fill="#FEF7EC"/>
  
  <!-- Right eye -->
  <circle cx="19" cy="17" r="2.2" fill="#FEF7EC"/>
  <circle cx="19.5" cy="17.2" r="1.2" fill="#1E293B"/>
  <circle cx="20" cy="16.5" r="0.4" fill="#FEF7EC"/>
  
  <!-- Happy mouth -->
  <path d="M13 21.5 Q16 24.5 19 21.5" stroke="#FEF7EC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Sound wave right -->
  <path d="M25.5 14 Q28 16 25.5 18" stroke="#F59E0B" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M27 12.5 Q31 16 27 19.5" stroke="#F59E0B" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
